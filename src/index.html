<!doctype html>
<html lang="sr">
  <head>
    <meta charset="utf-8" />
    <title>Planeta</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta
      name="description"
      content="Planeta webshop: patike, odjeća i oprema sa brzom isporukom i sigurnom kupovinom."
    />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://euroleague-tiebreaker.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Genos:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Material+Icons+Outlined&display=swap"
      rel="stylesheet"
    />

    <style>
      html.app-booting,
      html.app-booting body {
        overflow: hidden;
      }

      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 2500;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 38%, #ffffff 0%, #f4f4f4 56%, #ececec 100%);
        opacity: 1;
        visibility: visible;
        transition:
          opacity 0.28s ease,
          visibility 0.28s ease;
      }

      #startup-splash .splash-inner {
        width: min(78vw, 340px);
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      #startup-splash .splash-logo {
        width: min(74vw, 268px);
        height: auto;
        display: block;
      }

      #startup-splash .splash-track {
        width: 100%;
        height: 3px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      #startup-splash .splash-track::before {
        content: '';
        display: block;
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: #111;
        animation: splash-progress 1.05s ease-in-out infinite;
        transform-origin: left center;
      }

      html.app-ready #startup-splash {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @keyframes splash-progress {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        #startup-splash .splash-track::before {
          animation: none;
          transform: translateX(0);
          width: 100%;
        }
      }
    </style>

    <script>
      (function () {
        document.documentElement.classList.add('app-booting');
        window.__PLANETA_BOOT_TS__ = Date.now();
      })();
    </script>
  </head>
  <body>
    <div id="startup-splash" role="status" aria-label="Učitavanje Planeta webshop-a">
      <div class="splash-inner">
        <img
          class="splash-logo"
          src="assets/images/logo/planets_main_logo.png"
          alt="Planeta"
          width="268"
          height="53"
          fetchpriority="high"
        />
        <div class="splash-track" aria-hidden="true"></div>
      </div>
    </div>
    <app-root></app-root>
  </body>
</html>
