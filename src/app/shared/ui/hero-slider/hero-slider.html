<section
  class="hero"
  (mouseenter)="pause()"
  (mouseleave)="resume()"
  aria-roledescription="carousel"
  aria-live="polite"
>
  <div class="slides">
    @for (s of slides; let i = $index; track i) {
      <div
        class="slide"
        [class.active]="i === index()"
        [attr.aria-hidden]="i === index() ? 'false' : 'true'"
        [style.--slide-bg-desktop]="'url(' + s.desktop + ')'"
        [style.--slide-bg-mobile]="'url(' + s.mobile + ')'"
      >
        <picture class="slide-media">
          <source [srcset]="s.mobile" media="(max-width: 768px)" />
          <img
            [ngSrc]="s.desktop"
            [alt]="s.alt"
            fill
            [sizes]="'100vw'"
            [priority]="i === 0"
            [attr.loading]="i === 0 ? 'eager' : 'lazy'"
            [attr.fetchpriority]="i === 0 ? 'high' : 'auto'"
            decoding="async"
          />
        </picture>
      </div>
    }
  </div>

  <button class="ctrl prev" type="button" (click)="prev()" aria-label="Prethodni banner">‹</button>
  <button class="ctrl next" type="button" (click)="next()" aria-label="Sljedeći banner">›</button>

  <div class="dots">
    @for (s of slides; let i = $index; track i) {
      <button
        type="button"
        class="dot"
        [class.active]="i === index()"
        (click)="go(i)"
        [attr.aria-label]="'Go to slide ' + (i + 1)"
      ></button>
    }
  </div>
</section>
