<section class="discount-slider" aria-label="Proizvodi na popustu">
  <div class="head">
    <h2 class="title">Na popustu</h2>
    <a class="head-link" [routerLink]="['/catalog', 'muskarci', 'obuca']" [queryParams]="{ sale: 1 }">
      Pogledajte sve akcije
    </a>
  </div>

  @if (error()) {
    <div class="state error" role="alert">{{ error() }}</div>
  } @else if (loading()) {
    <div class="state loading" role="status" aria-live="polite">Učitavanje proizvoda na popustu...</div>
  } @else {
    <div class="discount-row" role="list">
      @for (p of visibleProducts(); track p.id) {
        <div class="discount-item card-item" role="listitem">
          <app-product-card [product]="p"></app-product-card>
        </div>
      }

      <a
        class="discount-item more-card"
        [routerLink]="['/catalog', 'muskarci', 'obuca']"
        [queryParams]="{ sale: 1 }"
        aria-label="Pogledajte više proizvoda na popustu"
        role="listitem"
      >
        <div class="more-badge">Akcija</div>
        <h3>Pogledajte više</h3>
        <p>Otkrijte kompletnu ponudu sniženih modela.</p>
        <span class="more-arrow">→</span>
      </a>
    </div>
  }
</section>
